{% assign remainder = include.index | modulo: 2 %}

<div class="row project-card {% if include.featured %} card-highlight {% endif %}">
    {% if include.featured %}
        <span class="text-primary">
            <i class="fas fa-star"></i> Highlight
        </span>
    {% endif %}

    <div class="py-3 px-4 col-md-6 img-column order-1 {% if remainder == 0 %} order-md-2 {% else %}order-md-1{% endif %}">
        <a href="{{ include.project.link }}" target="_blank" class="justify-content-center">
            <img src="{{ include.project.image | relative_url }}" class="py-1 px-1 img-project rounded">
        </a>
    </div>

    <div class="py-3 px-3 col-md-6 order-2 {% if remainder == 0 %}order-md-1{% else %}order-md-2{% endif %}">
        <div class="project-content-box">
            <h3 class="project-title">{{ include.project.title }}</h3>
            <div class="project-description">
                {{ include.project.content | markdownify }}
            </div>
            {% if include.project.link %}
            <a href="{{ include.project.link }}" class="link-academic" target="_blank">
                <i class="fa-solid fa-arrow-up-right-from-square"></i>
                {{ include.project.link_text }}
            </a>
            {% endif %}
        </div>
    </div>
</div>
